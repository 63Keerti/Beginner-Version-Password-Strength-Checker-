<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Password Strength Checker | Phase 1</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Light Mode (Default) */
        :root {
            --bg-gradient: linear-gradient(135deg, #70a46f 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --weak: #ef4444;
            --fair: #f59e0b;
            --good: #3b82f6;
            --strong: #10b981;
            --criteria-bg: #f9fafb;
            --tips-bg: #fef3c7;
            --tips-text: #92400e;
            --button-text: white;
        }

        /* Dark Mode */
        body.dark {
            --bg-gradient: linear-gradient(135deg, #00a41e 0%, #0bb240 100%);
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --input-border: #475569;
            --weak: #f87171;
            --fair: #fbbf24;
            --good: #60a5fa;
            --strong: #34d399;
            --criteria-bg: #0f172a;
            --tips-bg: #451a03;
            --tips-text: #fed7aa;
            --button-text: #f1f5f9;
        }

        .container {
            background: var(--card-bg);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            transition: all 0.3s ease;
        }

        /* Header with Dark Mode Toggle */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .dark-mode-toggle {
            background: var(--criteria-bg);
            border: 2px solid var(--border);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
            color: var(--text-primary);
        }

        .dark-mode-toggle:hover {
            transform: scale(1.05);
        }

        /* Password Input Area */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        #password {
            width: 100%;
            padding: 15px 100px 15px 15px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: var(--input-bg);
            border: 2px solid var(--input-border);
            border-radius: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        #password:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .button-group {
            position: absolute;
            right: 8px;
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px 10px;
            border-radius: 8px;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .icon-btn:hover {
            background: var(--border);
            transform: scale(1.05);
        }

        /* Animated Progress Bar */
        .strength-meter {
            margin: 20px 0;
        }

        .strength-bar-container {
            height: 10px;
            border-radius: 10px;
            background: var(--border);
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 10px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s;
            background: #ccc;
        }

        .strength-text {
            text-align: center;
            margin-top: 10px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Strength Colors */
        .weak-fill { background: var(--weak); }
        .fair-fill { background: var(--fair); }
        .good-fill { background: var(--good); }
        .strong-fill { background: var(--strong); }

        .weak-text { color: var(--weak); }
        .fair-text { color: var(--fair); }
        .good-text { color: var(--good); }
        .strong-text { color: var(--strong); }

        /* Criteria Section */
        .criteria {
            background: var(--criteria-bg);
            border-radius: 16px;
            padding: 18px;
            margin: 20px 0;
        }

        .criteria h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--text-secondary);
        }

        .criteria-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            list-style: none;
        }

        .criteria-list li {
            font-size: 0.85rem;
            padding: 5px 0;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .criteria-list li::before {
            content: "❌";
            font-size: 0.9rem;
        }

        .criteria-list li.valid::before {
            content: "✅";
        }

        /* Security Tips Box */
        .security-tips {
            background: var(--tips-bg);
            border-radius: 16px;
            padding: 18px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid var(--fair);
        }

        .security-tips.show {
            display: block;
            animation: slideDown 0.3s ease;
        }

        .security-tips h4 {
            color: var(--tips-text);
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .security-tips ul {
            margin-left: 20px;
            color: var(--tips-text);
            font-size: 0.85rem;
        }

        .security-tips li {
            margin: 5px 0;
        }

        /* Crack Time & Common Password */
        .info-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .info-card {
            flex: 1;
            background: var(--criteria-bg);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
        }

        .info-card .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .info-card .value {
            font-size: 1rem;
            font-weight: bold;
            margin-top: 5px;
            color: var(--text-primary);
            word-break: break-word;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--button-text);
        }

        .btn-secondary {
            background: var(--criteria-bg);
            border: 2px solid var(--border);
            color: var(--text-primary);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* Copy Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 550px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 1.4rem;
            }
            .criteria-list {
                grid-template-columns: 1fr;
            }
            .info-panel {
                flex-direction: column;
            }
            .action-buttons {
                flex-direction: column;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Password Strength Checker</h1>
            <button class="dark-mode-toggle" onclick="toggleDarkMode()">🌙 Dark</button>
        </div>

        <!-- Password Input -->
        <div class="input-group">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Type or generate a password...">
                <div class="button-group">
                    <button class="icon-btn" onclick="togglePasswordVisibility()" title="Show/Hide">👁️</button>
                    <button class="icon-btn" onclick="copyPassword()" title="Copy Password">📋</button>
                </div>
            </div>
        </div>

        <!-- Animated Strength Meter -->
        <div class="strength-meter">
            <div class="strength-bar-container">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <!-- Crack Time & Common Password Detection -->
        <div class="info-panel">
            <div class="info-card">
                <div class="label">⏱️ Crack Time Estimate</div>
                <div class="value" id="crackTime">-</div>
            </div>
            <div class="info-card">
                <div class="label">⚠️ Common Password</div>
                <div class="value" id="commonStatus">Not Checked</div>
            </div>
        </div>

        <!-- Criteria Checklist -->
        <div class="criteria">
            <h3>📋 Password Requirements</h3>
            <ul class="criteria-list">
                <li id="lengthCrit">At least 8 characters</li>
                <li id="uppercaseCrit">Uppercase letter (A-Z)</li>
                <li id="lowercaseCrit">Lowercase letter (a-z)</li>
                <li id="numberCrit">Number (0-9)</li>
                <li id="specialCrit">Special character (!@#$%^&*)</li>
            </ul>
        </div>

        <!-- Security Tips -->
        <div class="security-tips" id="securityTips">
            <h4>💡 Security Tips</h4>
            <ul id="tipsList"></ul>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="btn" onclick="generateStrongPassword()">✨ Generate Strong Password</button>
            <button class="btn btn-secondary" onclick="clearPassword()">🗑️ Clear</button>
        </div>
    </div>

    <div id="toast" class="toast">✅ Copied to clipboard!</div>

    <script>
        // DOM Elements
        const passwordInput = document.getElementById('password');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');
        const crackTimeEl = document.getElementById('crackTime');
        const commonStatusEl = document.getElementById('commonStatus');
        const securityTipsDiv = document.getElementById('securityTips');
        const tipsList = document.getElementById('tipsList');

        // Common passwords database (top 20 most common)
        const commonPasswords = [
            'password', '123456', '123456789', 'qwerty', 'password123', '12345678', 'admin', 
            'welcome', '12345', 'qwerty123', '1q2w3e', '1234567890', 'password1', 'abc123', 
            'iloveyou', 'admin123', '123123', 'qwertyuiop', 'letmein', 'monkey', 'dragon',
            'baseball', 'football', 'master', 'sunshine', 'passw0rd', 'shadow', 'superman'
        ];

        // Crack time estimation (simplified but realistic)
        function estimateCrackTime(password) {
            if (!password || password.length === 0) return '-';
            
            let charsetSize = 0;
            if (/[a-z]/.test(password)) charsetSize += 26;
            if (/[A-Z]/.test(password)) charsetSize += 26;
            if (/[0-9]/.test(password)) charsetSize += 10;
            if (/[!@#$%^&*(),.?":{}|<>]/.test(password)) charsetSize += 33;
            
            if (charsetSize === 0) return 'Instant';
            
            const combinations = Math.pow(charsetSize, password.length);
            // Assuming 1 billion guesses per second (modern GPU)
            const seconds = combinations / 1_000_000_000;
            
            if (seconds < 1) return 'Less than 1 second';
            if (seconds < 60) return `${Math.round(seconds)} seconds`;
            if (seconds < 3600) return `${Math.round(seconds / 60)} minutes`;
            if (seconds < 86400) return `${Math.round(seconds / 3600)} hours`;
            if (seconds < 31536000) return `${Math.round(seconds / 86400)} days`;
            if (seconds < 31536000 * 100) return `${Math.round(seconds / 31536000)} years`;
            return 'Centuries (>100 years)';
        }

        // Check if password is common
        function isCommonPassword(password) {
            if (!password) return false;
            const lowerPass = password.toLowerCase();
            return commonPasswords.includes(lowerPass);
        }

        // Main strength checker
        function checkPasswordStrength() {
            const password = passwordInput.value;
            
            if (!password) {
                strengthFill.style.width = '0%';
                strengthText.textContent = '';
                strengthFill.className = 'strength-fill';
                crackTimeEl.textContent = '-';
                commonStatusEl.textContent = 'Not Checked';
                securityTipsDiv.classList.remove('show');
                resetCriteria();
                return;
            }

            // Criteria checks
            const checks = {
                length: password.length >= 8,
                uppercase: /[A-Z]/.test(password),
                lowercase: /[a-z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
            };

            // Update UI criteria
            updateCriteriaUI(checks);
            
            // Calculate score (0-5)
            let score = 0;
            if (checks.length) score++;
            if (checks.uppercase) score++;
            if (checks.lowercase) score++;
            if (checks.number) score++;
            if (checks.special) score++;
            
            // Bonus for length > 12
            if (password.length >= 12) score = Math.min(5, score + 0.5);
            
            // Determine strength
            let strength = '';
            let strengthPercent = 0;
            let message = '';
            
            if (score <= 2) {
                strength = 'weak';
                strengthPercent = 25;
                message = '⚠️ Weak - Easily guessable';
            } else if (score <= 3.5) {
                strength = 'fair';
                strengthPercent = 50;
                message = '🟡 Fair - Could be stronger';
            } else if (score <= 4.5) {
                strength = 'good';
                strengthPercent = 75;
                message = '🔵 Good - Solid password';
            } else {
                strength = 'strong';
                strengthPercent = 100;
                message = '✅ Strong - Excellent security';
            }
            
            // Animate progress bar
            strengthFill.style.width = `${strengthPercent}%`;
            strengthFill.className = `strength-fill ${strength}-fill`;
            strengthText.textContent = message;
            strengthText.className = `strength-text ${strength}-text`;
            
            // Crack time estimation
            const crackTime = estimateCrackTime(password);
            crackTimeEl.textContent = crackTime;
            
            // Common password detection
            const isCommon = isCommonPassword(password);
            if (isCommon) {
                commonStatusEl.textContent = '⚠️ Yes (Top common password!)';
                commonStatusEl.style.color = 'var(--weak)';
            } else {
                commonStatusEl.textContent = '✅ No';
                commonStatusEl.style.color = 'var(--strong)';
            }
            
            // Generate security tips
            generateSecurityTips(password, checks, score);
        }
        
        function resetCriteria() {
            const items = ['lengthCrit', 'uppercaseCrit', 'lowercaseCrit', 'numberCrit', 'specialCrit'];
            items.forEach(id => {
                document.getElementById(id).classList.remove('valid');
            });
        }
        
        function updateCriteriaUI(checks) {
            document.getElementById('lengthCrit').classList.toggle('valid', checks.length);
            document.getElementById('uppercaseCrit').classList.toggle('valid', checks.uppercase);
            document.getElementById('lowercaseCrit').classList.toggle('valid', checks.lowercase);
            document.getElementById('numberCrit').classList.toggle('valid', checks.number);
            document.getElementById('specialCrit').classList.toggle('valid', checks.special);
        }
        
        function generateSecurityTips(password, checks, score) {
            const tips = [];
            
            if (!checks.length) tips.push('📏 Make password at least 8 characters long');
            if (!checks.uppercase) tips.push('🔠 Add uppercase letters (A-Z)');
            if (!checks.lowercase) tips.push('🔡 Add lowercase letters (a-z)');
            if (!checks.number) tips.push('🔢 Include numbers (0-9)');
            if (!checks.special) tips.push('✨ Use special characters (!@#$%^&*)');
            if (password.length < 12 && password.length > 0) tips.push('📈 Longer passwords are stronger - aim for 12+ characters');
            if (isCommonPassword(password)) tips.push('🚫 This is a commonly used password - choose something unique');
            if (/(.)\1{2,}/.test(password)) tips.push('🔁 Avoid repeated characters like "aaa"');
            if (/^[a-z]+$/.test(password) || /^[A-Z]+$/.test(password)) tips.push('📝 Mix uppercase and lowercase letters');
            if (/^[0-9]+$/.test(password)) tips.push('💪 Don\'t use only numbers - add letters and symbols');
            
            if (tips.length > 0) {
                tipsList.innerHTML = tips.map(tip => `<li>${tip}</li>`).join('');
                securityTipsDiv.classList.add('show');
            } else {
                securityTipsDiv.classList.remove('show');
            }
        }
        
        // Generate strong password
        function generateStrongPassword() {
            const length = 14;
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const special = '!@#$%^&*';
            
            let password = '';
            password += uppercase[Math.floor(Math.random() * uppercase.length)];
            password += lowercase[Math.floor(Math.random() * lowercase.length)];
            password += numbers[Math.floor(Math.random() * numbers.length)];
            password += special[Math.floor(Math.random() * special.length)];
            
            const allChars = uppercase + lowercase + numbers + special;
            for (let i = password.length; i < length; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }
            
            // Fisher-Yates shuffle for better randomness
            password = password.split('');
            for (let i = password.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [password[i], password[j]] = [password[j], password[i]];
            }
            password = password.join('');
            
            passwordInput.value = password;
            checkPasswordStrength();
            showToast('🔐 Strong password generated!');
        }
        
        // Copy password
        function copyPassword() {
            const password = passwordInput.value;
            if (!password) {
                showToast('⚠️ No password to copy');
                return;
            }
            navigator.clipboard.writeText(password);
            showToast('✅ Password copied to clipboard!');
        }
        
        // Clear password
        function clearPassword() {
            passwordInput.value = '';
            checkPasswordStrength();
            passwordInput.focus();
            showToast('🗑️ Cleared');
        }
        
        // Toggle password visibility
        function togglePasswordVisibility() {
            const type = passwordInput.type === 'password' ? 'text' : 'password';
            passwordInput.type = type;
        }
        
        // Toast notification
        let toastTimeout;
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }
        
        // Dark mode toggle
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const btn = document.querySelector('.dark-mode-toggle');
            if (document.body.classList.contains('dark')) {
                btn.textContent = '☀️ Light';
            } else {
                btn.textContent = '🌙 Dark';
            }
        }
        
        // Event listeners
        passwordInput.addEventListener('input', checkPasswordStrength);
        
        // Initial check
        checkPasswordStrength();
    </script>
</body>
</html>
